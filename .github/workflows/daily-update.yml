name: Daily Radar News Update

on:
  schedule:
    # 매일 한국시간(KST) 오전 8시 = UTC 23:00 (전날)
    - cron: "0 23 * * *"
  workflow_dispatch: {}   # GitHub 화면에서 수동 실행 버튼 활성화

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # feedparser 등 외부 패키지 불필요 - 표준 라이브러리만 사용
      - name: 뉴스 수집 + 페이지 생성
        run: python fetch_news.py

      - name: 변경사항 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ data/
          git diff --staged --quiet || git commit -m "Daily news update: $(date +'%Y-%m-%d')"
          git push
